name: Release

on:
  push:
    tags: ["v*"]

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: apistress_amd64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: apistress_x64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: apistress_arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libpango1.0-dev \
            libjavascriptcoregtk-4.1-dev libsoup-3.0-dev

      - name: Build Tauri
        run: pnpm tauri build --bundles deb,appimage
        if: runner.os == 'Linux'

      - name: Build Tauri
        run: pnpm tauri build --bundles nsis
        if: runner.os == 'Windows'

      - name: Build Tauri
        run: pnpm tauri build --bundles dmg
        if: runner.os == 'macOS'

      - name: Collect artifacts (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p release
          cp src-tauri/target/release/bundle/deb/*.deb release/ 2>/dev/null || true
          cp src-tauri/target/release/bundle/appimage/*.AppImage release/ 2>/dev/null || true
          cd release && for f in *; do mv "$f" "${{ matrix.artifact }}_${f#apistress}"; done

      - name: Collect artifacts (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir -p release
          cp src-tauri/target/release/bundle/nsis/*.exe release/ 2>/dev/null || true
          cd release
          Get-ChildItem | ForEach-Object { Rename-Item $_ "${{ matrix.artifact }}_$($_.Name -replace 'apistress_','')" }

      - name: Collect artifacts (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p release
          cp src-tauri/target/release/bundle/dmg/*.dmg release/ 2>/dev/null || true
          cd release && for f in *; do mv "$f" "${{ matrix.artifact }}_${f#apistress}"; done

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: release/*
          if-no-files-found: ignore

  publish:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - run: ls -laR artifacts/

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
