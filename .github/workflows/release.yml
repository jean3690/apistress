name: Release

on:
  push:
    tags: ["v*"]

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: apistress_amd64
            bundles: deb,appimage
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: apistress_x64
            bundles: nsis
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            artifact: apistress_arm64_windows
            bundles: nsis
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: apistress_amd64_mac
            bundles: dmg
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: apistress_arm64_mac
            bundles: dmg

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v4
        id: tauri_build
        with:
          target: ${{ matrix.target }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Collect and rename artifacts
        run: |
          mkdir -p release
          BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle"
          for dir in deb appimage dmg nsis msi; do
            if [ -d "$BUNDLE_DIR/$dir" ]; then
              cp "$BUNDLE_DIR/$dir"/*.deb "$BUNDLE_DIR/$dir"/*.AppImage \
                 "$BUNDLE_DIR/$dir"/*.dmg "$BUNDLE_DIR/$dir"/*.exe \
                 "$BUNDLE_DIR/$dir"/*.msi release/ 2>/dev/null || true
            fi
          done
          cd release
          for f in *; do
            [ -f "$f" ] || continue
            ext="${f##*.}"
            mv "$f" "${{ matrix.artifact }}.${ext}"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: release/*
          if-no-files-found: ignore

  publish:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -laR artifacts/

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
