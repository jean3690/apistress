name: Release

on:
  push:
    tags: ["v*"]

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: apistress_amd64
            bundles: deb,appimage
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: apistress_arm64_linux
            bundles: deb
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: apistress_x64
            bundles: nsis
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            artifact: apistress_arm64_windows
            bundles: nsis
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: apistress_amd64_mac
            bundles: dmg
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: apistress_arm64_mac
            bundles: dmg

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libpango1.0-dev \
            libjavascriptcoregtk-4.1-dev libsoup-3.0-dev

      - name: Install Linux arm64 cross-compile deps
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        with:
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Collect and rename artifacts
        run: |
          mkdir -p release
          BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle"
          if [ -d "$BUNDLE_DIR/deb" ]; then
            cp "$BUNDLE_DIR"/deb/*.deb release/ 2>/dev/null || true
          fi
          if [ -d "$BUNDLE_DIR/appimage" ]; then
            cp "$BUNDLE_DIR"/appimage/*.AppImage release/ 2>/dev/null || true
          fi
          if [ -d "$BUNDLE_DIR/dmg" ]; then
            cp "$BUNDLE_DIR"/dmg/*.dmg release/ 2>/dev/null || true
          fi
          if [ -d "$BUNDLE_DIR/nsis" ]; then
            cp "$BUNDLE_DIR"/nsis/*.exe release/ 2>/dev/null || true
          fi
          cd release
          for f in *; do
            [ -f "$f" ] || continue
            mv "$f" "${{ matrix.artifact }}_${f}"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: release/*
          if-no-files-found: ignore

  publish:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -laR artifacts/

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
