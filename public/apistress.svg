<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1e2e"/>
      <stop offset="100%" stop-color="#181825"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#74c7ec"/>
      <stop offset="100%" stop-color="#89b4fa"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="url(#bg)"/>

  <!-- Border -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="none" stroke="#45475a" stroke-width="4"/>

  <!-- Upward trend chart lines (stress test graph) -->
  <!-- Grid lines -->
  <line x1="120" y1="380" x2="420" y2="380" stroke="#313244" stroke-width="2"/>
  <line x1="120" y1="300" x2="420" y2="300" stroke="#313244" stroke-width="1.5"/>
  <line x1="120" y1="220" x2="420" y2="220" stroke="#313244" stroke-width="1.5"/>
  <line x1="120" y1="140" x2="420" y2="140" stroke="#313244" stroke-width="1.5"/>

  <!-- Vertical guides -->
  <line x1="195" y1="140" x2="195" y2="380" stroke="#313244" stroke-width="1" opacity="0.5"/>
  <line x1="270" y1="140" x2="270" y2="380" stroke="#313244" stroke-width="1" opacity="0.5"/>
  <line x1="345" y1="140" x2="345" y2="380" stroke="#313244" stroke-width="1" opacity="0.5"/>

  <!-- Trend line - step-like increase representing load -->
  <polyline points="120,340 150,340 180,320 210,320 240,280 270,280 300,240 330,240 360,180 390,180 420,150"
    fill="none" stroke="url(#accent)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Glow version -->
  <polyline points="120,340 150,340 180,320 210,320 240,280 270,280 300,240 330,240 360,180 390,180 420,150"
    fill="none" stroke="#89b4fa" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>

  <!-- Data points -->
  <circle cx="150" cy="340" r="7" fill="#89b4fa"/>
  <circle cx="240" cy="280" r="7" fill="#89b4fa"/>
  <circle cx="330" cy="240" r="7" fill="#89b4fa"/>
  <circle cx="420" cy="150" r="9" fill="#a6e3a1"/>

  <!-- Concurrent request indicator - three parallel arrows -->
  <g transform="translate(256, 410)" opacity="0.9">
    <line x1="-60" y1="0" x2="60" y2="0" stroke="#89b4fa" stroke-width="4" stroke-linecap="round"/>
    <polygon points="55,-6 70,0 55,6" fill="#89b4fa"/>

    <line x1="-50" y1="16" x2="50" y2="16" stroke="#74c7ec" stroke-width="3" stroke-linecap="round"/>
    <polygon points="46,11 58,16 46,21" fill="#74c7ec"/>

    <line x1="-40" y1="30" x2="40" y2="30" stroke="#a6adc8" stroke-width="2.5" stroke-linecap="round"/>
    <polygon points="37,27 46,30 37,33" fill="#a6adc8"/>
  </g>
</svg>
